<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>FMSGA Icon Generator</title></head>
<body style="font-family:sans-serif;padding:24px;background:#f4f7fa">
<h3>Generate Icon PWA FMSGA</h3>
<p style="color:#666;margin-bottom:16px">Klik tombol di bawah untuk download icon 192×192 dan 512×512</p>
<canvas id="c" style="display:none"></canvas>
<button onclick="gen(192)" style="padding:10px 20px;margin-right:8px;background:#0D7C66;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">⬇ Download icon-192.png</button>
<button onclick="gen(512)" style="padding:10px 20px;background:#0D7C66;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">⬇ Download icon-512.png</button>
<script>
function gen(size) {
  const c = document.getElementById('c');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size * 0.18;

  // Background gradient
  const g = ctx.createLinearGradient(0, 0, size, size);
  g.addColorStop(0, '#063a2e');
  g.addColorStop(1, '#17B890');
  ctx.fillStyle = g;

  // Rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Cross (palang merah = hospital)
  const cx = size / 2, cy = size / 2;
  const thick = size * 0.12, len = size * 0.4;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';

  // Horizontal bar
  ctx.fillRect(cx - len/2, cy - thick/2, len, thick);
  // Vertical bar
  ctx.fillRect(cx - thick/2, cy - len/2, thick, len);

  // Text "FMSGA"
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `bold ${size * 0.1}px 'Arial Rounded MT Bold', Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('FMSGA', cx, size * 0.93);

  // Download
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
